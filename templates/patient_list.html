{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-blue-50 py-10 px-4">

  <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl border border-blue-200">

    <!-- Header -->
    <div class="flex flex-col md:flex-row items-center justify-between px-8 py-6
                bg-gradient-to-r from-blue-600 to-blue-400 rounded-t-3xl shadow-lg mb-4">
      <h2 class="text-3xl font-bold text-white tracking-wide mb-4 md:mb-0">Patients</h2>

      <a href="{% url 'patient_create' %}"
         class="inline-flex items-center gap-2
                bg-white/20 text-white font-semibold
                px-6 py-3 rounded-xl shadow-md hover:shadow-xl
                hover:bg-white/30 transform hover:-translate-y-0.5 transition duration-200">

        <!-- Plus Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 4v16m8-8H4" />
        </svg>
        Add Patient
      </a>
    </div>

    <!-- Table -->
    <div class="p-6 overflow-x-auto">
      <table class="min-w-full border border-blue-200 rounded-lg overflow-hidden shadow-sm">
        <thead class="bg-blue-100 text-blue-700 text-sm uppercase tracking-wide">
          <tr>
            <th class="px-6 py-3 text-left">Name</th>
            <th class="px-6 py-3 text-left">Phone</th>
            <th class="px-6 py-3 text-center">Actions</th>
          </tr>
        </thead>

        <tbody class="divide-y divide-blue-200">
          {% for p in patients %}
          <tr class="hover:bg-blue-50 transition duration-200">
            <td class="px-6 py-4 font-medium text-blue-800">
              {{ p }}
            </td>

            <td class="px-6 py-4 text-blue-600">
              {{ p.phone }}
            </td>

            <td class="px-6 py-4">
              <div class="flex justify-center gap-3">
                <a href="{% url 'patient_update' p.id %}"
                   class="px-4 py-2 text-sm rounded-lg bg-blue-500 text-white hover:bg-blue-600 shadow transition">
                  Edit
                </a>
                <a href="{% url 'patient_delete' p.id %}"
                   class="px-4 py-2 text-sm rounded-lg bg-red-500 text-white hover:bg-red-600 shadow transition"
                   onclick="return confirm('Are you sure?')">
                  Delete
                </a>
              </div>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="3" class="text-center py-8 text-blue-500 text-lg italic">
              No patients found.
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

  </div>

</div>
{% endblock %}
