{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-gradient-to-r from-indigo-50 via-purple-50 to-pink-50 shadow-xl rounded-2xl">
    <h2 class="text-3xl font-bold mb-6 text-gray-800 text-center">Add Appointment</h2>

    {% if error %}
    <div class="bg-red-100 text-red-700 px-4 py-2 rounded mb-4">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        <div>
            <label class="block mb-1 font-semibold text-gray-700">Doctor</label>
            {{ form.doctor }}
        </div>

        <div>
            <label class="block mb-1 font-semibold text-gray-700">Patient</label>
            {{ form.patient }}
        </div>

        <div>
            <label class="block mb-1 font-semibold text-gray-700">Date</label>
            {{ form.date }}
        </div>

        <div>
            <label class="block mb-1 font-semibold text-gray-700">Time</label>
            {{ form.time }}
        </div>

        <div>
            <label class="block mb-1 font-semibold text-gray-700">Status</label>
            {{ form.status }}
        </div>

        <div class="flex justify-center space-x-4 mt-4">
            <button type="submit" class="bg-teal-600 text-white px-6 py-2 rounded-full hover:bg-teal-700 shadow">Save</button>
            <a href="{% url 'appointment_list' %}" class="bg-gray-500 text-white px-6 py-2 rounded-full hover:bg-gray-600 shadow">Back</a>
        </div>
    </form>
</div>
{% endblock %}
