{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen bg-green-50 flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white shadow-2xl rounded-2xl overflow-hidden">

    <!-- Header -->
    <div class="bg-gradient-to-r from-green-600 to-emerald-500 p-6">
      <h2 class="text-3xl font-bold text-white text-center tracking-wide">
        {{ title }}
      </h2>
    </div>

    <!-- Form -->
    <form method="post" class="p-8 space-y-5">
      {% csrf_token %}

      {% for field in form %}
        <div>
          <label class="block text-sm font-semibold text-green-700 mb-2">
            {{ field.label }}
          </label>
          {{ field }}

          {% if field.errors %}
            <p class="text-red-600 text-sm mt-1">
              {{ field.errors|striptags }}
            </p>
          {% endif %}
        </div>
      {% endfor %}

      <!-- Buttons -->
      <div class="flex justify-center gap-4 pt-6">
        <button type="submit"
          class="bg-green-600 text-white px-8 py-2 rounded-lg
                 hover:bg-green-700 shadow-md transition duration-200">
          Save
        </button>

        <a href="{% url 'medicine_list' %}"
           class="bg-gray-200 text-gray-700 px-8 py-2 rounded-lg
                  hover:bg-gray-300 transition">
          Cancel
        </a>
      </div>

    </form>
  </div>

</div>
{% endblock %}
