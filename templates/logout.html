{% extends 'base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-red-50 to-gray-100 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-200 p-8 text-center">

    <!-- Icon -->
    <div class="mx-auto mb-4 flex items-center justify-center w-16 h-16 rounded-full bg-red-100">
      <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
      </svg>
    </div>

    <!-- Text -->
    <h2 class="text-2xl font-bold text-gray-800 mb-2">
      Logout Confirmation
    </h2>
    <p class="text-gray-600 mb-6">
      Are you sure you want to log out of your account?
    </p>

    <!-- Buttons -->
    <form method="post" class="flex justify-center gap-4">
      {% csrf_token %}

      <button type="submit"
        class="bg-red-600 text-white px-6 py-2 rounded-xl font-semibold
               hover:bg-red-700 transition shadow-md hover:shadow-lg">
        Logout
      </button>

      <a href="{% url 'patient_list' %}"
        class="bg-gray-200 text-gray-800 px-6 py-2 rounded-xl font-semibold
               hover:bg-gray-300 transition shadow">
        Cancel
      </a>
    </form>

  </div>
</div>

{% endblock %}
