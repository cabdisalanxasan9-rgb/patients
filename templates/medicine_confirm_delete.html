{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-gradient-to-r from-indigo-50 via-purple-50 to-pink-50 shadow-xl rounded-2xl text-center">
  <h2 class="text-3xl font-bold mb-6 text-gray-800">Delete Medicine</h2>
  <p class="text-gray-700">Are you sure you want to delete <strong>{{ medicine.name }}</strong>?</p>

  <form method="post" class="mt-6 flex justify-center space-x-4">
    {% csrf_token %}
    <button type="submit" class="bg-red-500 text-white px-6 py-2 rounded-full hover:bg-red-600 shadow">Yes, Delete</button>
    <a href="{% url 'medicine_list' %}" class="bg-gray-500 text-white px-6 py-2 rounded-full hover:bg-gray-600 shadow">Cancel</a>
  </form>
</div>
{% endblock %}
