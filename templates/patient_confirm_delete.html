{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-gray-200">

    <!-- Header -->
    <div class="bg-red-600 rounded-t-2xl px-6 py-4">
      <h3 class="text-xl font-bold text-white">
        Delete Patient
      </h3>
    </div>

    <!-- Body -->
    <div class="p-6 text-center">
      <div class="mx-auto mb-4 flex items-center justify-center
                  h-12 w-12 rounded-full bg-red-100 text-red-600">
        ⚠️
      </div>

      <p class="text-gray-700 text-lg mb-2">
        Are you sure you want to delete
      </p>

      <p class="font-semibold text-gray-900 mb-6">
        {{ patient }}?
      </p>

      <form method="post" class="flex items-center justify-center gap-4">
        {% csrf_token %}

        <button type="submit"
          class="px-5 py-2 rounded-xl
                 bg-red-600 text-white font-semibold
                 hover:bg-red-700
                 shadow-md hover:shadow-lg
                 transition">
          Yes, Delete
        </button>

        <a href="{% url 'patient_list' %}"
           class="px-5 py-2 rounded-xl
                  bg-gray-200 text-gray-700 font-semibold
                  hover:bg-gray-300 transition">
          Cancel
        </a>
      </form>
    </div>

  </div>

</div>
{% endblock %}
