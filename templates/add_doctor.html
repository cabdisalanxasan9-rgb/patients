{% extends 'base.html' %}
{% block content %}

<div class="min-h-screen bg-blue-50 flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden">

   <!-- Header -->
<div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 relative">

  <!-- Back Arrow -->
  <a href="javascript:history.back()"
     class="absolute left-5 top-1/2 -translate-y-1/2 text-white hover:text-blue-200 transition">
    <svg xmlns="http://www.w3.org/2000/svg"
         class="h-7 w-7"
         fill="none"
         viewBox="0 0 24 24"
         stroke="currentColor"
         stroke-width="2">
      <path stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 19l-7-7 7-7" />
    </svg>
  </a>

  <h1 class="text-3xl font-bold text-white text-center tracking-wide">
    Add New Doctor
  </h1>
</div>


    <!-- Form -->
    <form method="post" enctype="multipart/form-data" class="p-8 space-y-4">
      {% csrf_token %}

      <div class="space-y-3">
        {{ form.as_p }}
      </div>

      <button type="submit"
        class="w-full bg-blue-600 text-white py-3 rounded-lg
               font-semibold hover:bg-blue-700 shadow-md
               transition duration-200 mt-4">
        Save Doctor
      </button>
    </form>

  </div>

</div>

{% endblock %}
