{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Management | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-blue-100 flex items-center justify-center">

  <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-600 to-blue-500 p-6 text-center">
      <div class="text-white text-4xl mb-2"></div>
      <h2 class="text-white text-2xl font-bold">Patient Management</h2>
      <p class="text-blue-100 text-sm">Welcome back</p>
    </div>

    <!-- Form -->
    <form method="POST" class="p-6 space-y-5">
      {% csrf_token %}

      <div>
        <label class="block text-gray-600 mb-1">Username</label>
        <input type="text" name="username"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-gray-600 mb-1">Password</label>
        <input type="password" name="password"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <button type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold">
        Login
      </button>

      <p class="text-center text-sm text-gray-600">
        Don’t have an account?
        <a href="{% url 'signup' %}" class="text-blue-600 font-semibold">Sign up</a>
      </p>
    </form>
  </div>

</body>
</html>
