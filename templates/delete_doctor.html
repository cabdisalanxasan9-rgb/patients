{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded shadow text-center">
    <h1 class="text-2xl font-bold mb-4">Delete Doctor</h1>
    <p class="mb-6">Are you sure you want to delete Dr. {{ doctor.first_name }} {{ doctor.last_name }}?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Yes, Delete</button>
        <a href="{% url 'doctor_list' %}" class="ml-4 bg-gray-300 px-4 py-2 rounded hover:bg-gray-400">Cancel</a>
    </form>
</div>
{% endblock %}
