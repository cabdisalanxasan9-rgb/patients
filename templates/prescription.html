{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-gray-100 flex items-start justify-center py-10">

  <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl border border-gray-200">

    <!-- Header -->
    <div class="bg-gradient-to-r from-teal-600 to-blue-600 rounded-t-2xl px-8 py-5">
      <h2 class="text-2xl font-bold text-white">
        Medical Prescription
      </h2>
      <p class="text-teal-100 text-sm mt-1">
        Patient: <span class="font-semibold">{{ appointment.patient }}</span>
      </p>
    </div>

    <!-- Form -->
    <div class="p-8">
      <form method="post" class="space-y-6">
        {% csrf_token %}

        <!-- Appointment -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">
            Appointment
          </label>
          {{ form.appointment }}
        </div>

        <!-- Diagnosis -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">
            Diagnosis
          </label>
          {{ form.diagnosis }}
        </div>

        <!-- Medicines -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">
            Medicines
          </label>
          {{ form.medicines }}
        </div>

        <!-- Notes -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">
            Notes
          </label>
          {{ form.notes }}
        </div>

        <!-- Buttons -->
        <div class="flex items-center justify-between pt-6 border-t">
          <!-- Back Button -->
          <a href="{% url 'appointment_list' %}"
             class="text-teal-700 hover:text-teal-900 font-medium shadow-md hover:bg-gray-100 bg-gray-100 px-4 py-2 rounded-xl">
             Back
          </a>

          <div class="flex gap-3">
            <!-- Prescription Save -->
            <button type="submit"
              class="px-6 py-2 rounded-xl bg-teal-600 text-white font-semibold
                     shadow-md hover:bg-teal-700 focus:ring-4
                     focus:ring-teal-300 transition">
              Save Prescription
            </button>

            <!-- Remove Patient Button -->
            <a href="{% url 'patient_delete' appointment.patient.id %}"
             onclick="return confirm('Are you sure you want to remove this patient?')"
               class="px-6 py-2 rounded-xl bg-red-500 text-white font-semibold
                      shadow-md hover:bg-red-600 transition">
              Remove Patient
            </a>
          </div>
        </div>
      </form>
    </div>

  </div>

</div>
{% endblock %}
