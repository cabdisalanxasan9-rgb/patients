{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-blue-50 flex items-center justify-center px-4">

  <div class="w-full max-w-lg bg-white shadow-2xl rounded-2xl overflow-hidden">

    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-600 to-blue-400 p-6">
      <h2 class="text-3xl font-bold text-white text-center tracking-wide">
        Add Patient
      </h2>
    </div>

    <!-- Form -->
    <form method="post" class="p-8 space-y-6">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-semibold text-blue-700 mb-2">
          First Name
        </label>
        {{ form.first_name }}
      </div>

      <div>
        <label class="block text-sm font-semibold text-blue-700 mb-2">
          Last Name
        </label>
        {{ form.last_name }}
      </div>

      <div>
        <label class="block text-sm font-semibold text-blue-700 mb-2">
          Phone
        </label>
        {{ form.phone }}
      </div>

      <!-- Buttons -->
      <div class="flex justify-between items-center pt-4">
        <button type="submit"
          class="bg-blue-600 text-white px-8 py-2 rounded-lg
                 hover:bg-blue-700 shadow-md transition duration-200">
          Save
        </button>

        <a href="{% url 'patient_list' %}"
           class="text-blue-600 font-semibold hover:underline">
          ← Back to Patients
        </a>
      </div>
    </form>

  </div>

</div>
{% endblock %}
