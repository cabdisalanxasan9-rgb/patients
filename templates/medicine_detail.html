{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-gradient-to-r from-indigo-50 via-purple-50 to-pink-50 shadow-xl rounded-2xl">
  <h2 class="text-3xl font-bold mb-6 text-gray-800 text-center">{{ medicine.name }}</h2>

  <div class="space-y-3 text-gray-700">
    <p><span class="font-semibold">Quantity:</span> {{ medicine.quantity }}</p>
    <p><span class="font-semibold">Price:</span> ${{ medicine.price }}</p>
    <p><span class="font-semibold">Description:</span> {{ medicine.description|default:"No description" }}</p>
  </div>

  <div class="mt-8 flex justify-center gap-4">
    
    <!-- Edit -->
    <a href="{% url 'medicine_edit' medicine.pk %}"
       class="inline-flex items-center gap-2 bg-gradient-to-r from-yellow-400 to-yellow-600 
              text-white px-6 py-2.5 rounded-full font-semibold
              shadow-lg hover:scale-105 hover:from-yellow-500 hover:to-yellow-700
              transition transform duration-200">
        ✏️ Edit
    </a>

    <!-- Delete -->
    <a href="{% url 'medicine_delete' medicine.pk %}"
       class="inline-flex items-center gap-2 bg-gradient-to-r from-red-500 to-red-700 
              text-white px-6 py-2.5 rounded-full font-semibold
              shadow-lg hover:scale-105 hover:from-red-600 hover:to-red-800
              transition transform duration-200">
        🗑️ Delete
    </a>

    <!-- Back -->
    <a href="{% url 'medicine_list' %}"
       class="inline-flex items-center gap-2 bg-gradient-to-r from-gray-500 to-gray-700 
              text-white px-6 py-2.5 rounded-full font-semibold
              shadow-lg hover:scale-105 hover:from-gray-600 hover:to-gray-800
              transition transform duration-200">
        ⬅️ Back
    </a>

</div>

</div>
{% endblock %}
